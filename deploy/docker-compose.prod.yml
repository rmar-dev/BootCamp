# Production docker-compose for a single-VPS BootCamp deployment.
#
# Run via: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# The bootstrap.sh script wraps the whole thing.
#
# Profiles:
#   default   — postgres + runners + platform + web + caddy (minimal demo)
#   lsp       — also brings up swift-lsp for L3 semantic IntelliSense
#
# Networking:
#   Caddy is the only thing exposed to the public internet (ports 80/443).
#   Everything else talks over the internal `bootcamp` docker network.
#   The browser sees a single origin (your domain), Caddy splits /api/* to
#   the platform and the rest to the web — eliminates CORS.

name: bootcamp

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: bootcamp-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [bootcamp]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10
    # No host-port mapping — internal access only.

  # ── Sandboxed code runners ────────────────────────────────────────────────
  # Long-running idle containers; the platform `exec`s into them per submit.
  swift-runner:
    image: swift:5.10
    container_name: bootcamp-swift-runner-prod
    command: tail -f /dev/null
    read_only: true
    network_mode: none           # untrusted code; no outbound traffic
    tmpfs:
      - /tmp:exec,mode=1777
      - /work:exec,mode=1777
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped

  kotlin-runner:
    build:
      context: ../platform/docker/kotlin-runner
      args:
        KOTLIN_VERSION: 1.9.25
    image: bootcamp/kotlin-runner:1.9.25
    container_name: bootcamp-kotlin-runner-prod
    command: tail -f /dev/null
    read_only: true
    network_mode: none
    tmpfs:
      - /tmp:exec,mode=1777
      - /work:exec,mode=1777
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped

  # ── L3 semantic IntelliSense (opt-in via `--profile lsp`) ─────────────────
  swift-lsp:
    build:
      context: ../platform/docker/swift-lsp
    image: bootcamp/swift-lsp:5.10
    container_name: bootcamp-swift-lsp-prod
    profiles: ["lsp"]
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped
    networks: [bootcamp]
    environment:
      MAX_SESSIONS: "8"
      IDLE_TIMEOUT_MS: "300000"
      HEARTBEAT_MS: "30000"

  # ── Platform (NestJS) ────────────────────────────────────────────────────
  platform:
    build:
      context: ..
      dockerfile: deploy/platform.Dockerfile
    image: bootcamp/platform:latest
    container_name: bootcamp-platform-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks: [bootcamp]
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      WEB_ORIGIN: https://${DOMAIN}
      FRONTEND_URL: https://${DOMAIN}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: https://${DOMAIN}/api/auth/google/callback
      AI_REVIEW_ENABLED: ${AI_REVIEW_ENABLED:-false}
      # Runner container names the platform's DockerRunner targets.
      SWIFT_RUNNER_CONTAINER: bootcamp-swift-runner-prod
      KOTLIN_RUNNER_CONTAINER: bootcamp-kotlin-runner-prod
    volumes:
      # The platform spawns runner execs via dockerode → needs the host docker socket.
      # Trade-off: the platform process gets full host Docker access. Acceptable
      # for a single-tenant demo; if you ever multi-tenant this, use a docker
      # API proxy with restricted ACLs instead.
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Web (Next.js) ────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    image: bootcamp/web:latest
    container_name: bootcamp-web-prod
    restart: unless-stopped
    depends_on:
      - platform
    networks: [bootcamp]
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"

  # ── Reverse proxy + TLS (the only public-facing service) ─────────────────
  caddy:
    image: caddy:2-alpine
    container_name: bootcamp-caddy
    restart: unless-stopped
    depends_on:
      - web
      - platform
    networks: [bootcamp]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  bootcamp:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

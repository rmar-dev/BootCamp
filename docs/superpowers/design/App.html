<!doctype html>
<html lang="en" data-theme="dark" data-density="comfortable">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BootCamp — Swift &amp; Kotlin</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="app-dashboard.jsx"></script>
<script type="text/babel" src="app-tree.jsx"></script>
<script type="text/babel" src="app-lesson.jsx"></script>
<script type="text/babel" src="app-ide.jsx"></script>
<script type="text/babel" src="app-profile.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute] = useState("dashboard");
  const [track, setTrack] = useState("swift");
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply theme + density
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
    document.documentElement.setAttribute("data-density", tweaks.density);
  }, [tweaks.theme, tweaks.density]);

  const screenLabel = ({
    dashboard: "01 Dashboard",
    tree: "02 Skill tree",
    lesson: "03 Lesson player",
    ide: "04 IDE / Class lab",
    profile: "05 Profile",
    leaderboard: "06 Leaderboard",
  })[route];

  // Lesson player is full-bleed (no sidebar/topbar)
  if (route === "lesson") {
    return (
      <>
        <div data-screen-label={screenLabel}>
          <LessonPlayer track={track} setRoute={setRoute} />
        </div>
        <Tweaks tweaks={tweaks} setTweak={setTweak} />
      </>
    );
  }

  return (
    <>
      <div className="app" data-screen-label={screenLabel}>
        <Sidebar route={route} setRoute={setRoute} track={track} />
        <div>
          <Topbar track={track} setTrack={setTrack} />
          {route === "dashboard"   && <Dashboard track={track} setRoute={setRoute} />}
          {route === "tree"        && <SkillTree track={track} setRoute={setRoute} />}
          {route === "ide"         && <IDE track={track} setRoute={setRoute} />}
          {route === "profile"     && <Profile track={track} />}
          {route === "leaderboard" && <Leaderboard track={track} />}
        </div>
      </div>
      <Tweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

function Tweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel>
      <TweakSection label="Appearance" />
      <TweakRadio label="Theme" value={tweaks.theme}
        options={["dark", "light"]}
        onChange={(v) => setTweak("theme", v)} />
      <TweakRadio label="Density" value={tweaks.density}
        options={["comfortable", "compact"]}
        onChange={(v) => setTweak("density", v)} />
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
